name: EcoTrack CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  backend-checks:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install black ruff mypy pytest pytest-asyncio pytest-cov

      - name: Format Check (Black)
        run: black . --check

      - name: Linter Check (Ruff)
        run: ruff check .

      - name: Type Check (Mypy)
        run: mypy . --strict --ignore-missing-imports

      - name: Run Tests & Coverage
        run: pytest -q --cov=app --cov-fail-under=90
        env:
          PROJECT_ID: test-project
          REGION: us-central1
          ANONYMIZATION_KEY_SECRET_NAME: test-secret

  frontend-checks:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend
    steps:
      - uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: './frontend/package-lock.json'

      - name: Install dependencies
        run: npm ci

      - name: Linter Check (ESLint)
        run: npx eslint src/ --max-warnings=0

      - name: Prettier Check
        run: npx prettier --check "src/**/*.{ts,tsx}"

      - name: Type Check (TypeScript)
        run: npx tsc --noEmit

      - name: Run Tests & Coverage
        run: npx jest --coverage --passWithNoTests
