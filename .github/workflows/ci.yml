name: EcoTrack CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  backend-checks:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install black ruff mypy pytest pytest-asyncio pytest-cov

      - name: Format Check (Black)
        run: black . --check

      - name: Linter Check (Ruff)
        run: ruff check .

      - name: Type Check (Mypy)
        run: mypy . --strict --ignore-missing-imports

      - name: Run Tests & Coverage
        run: pytest -q --cov=app --cov-fail-under=90 --cov-report=xml
        env:
          PROJECT_ID: test-project
          REGION: us-central1
          ANONYMIZATION_KEY_SECRET_NAME: test-secret

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          file: ./backend/coverage.xml
          flags: backend

  frontend-checks:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend
    steps:
      - uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: './frontend/package-lock.json'

      - name: Install dependencies
        run: npm ci

      - name: Linter Check (ESLint)
        run: npx eslint src/ --max-warnings=0

      - name: Prettier Check
        run: npx prettier --check "src/**/*.{ts,tsx}"

      - name: Type Check (TypeScript)
        run: npx tsc --noEmit

      - name: Run Tests & Coverage
        run: npx jest --coverage --passWithNoTests

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          directory: ./frontend/coverage
          flags: frontend

  security-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install pip-audit
        run: pip install pip-audit

      - name: Run pip-audit
        run: pip-audit -r backend/requirements.txt || echo "Pip audit failed, review dependencies"

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Run npm audit
        run: npm audit --prefix frontend || echo "NPM audit failed, review dependencies"

      - name: Detect Secrets
        uses: Yelp/detect-secrets@v1.4.0
        with:
          args: --baseline .secrets.baseline

  lighthouse:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Use Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
      - name: Install dependencies
        run: npm ci
        working-directory: ./frontend
      - name: Build frontend
        run: npm run build
        working-directory: ./frontend
      - name: Run Lighthouse CI
        uses: treosh/lighthouse-ci-action@v10
        with:
          configPath: './frontend/lighthouserc.json'
          uploadArtifacts: true
          temporaryPublicStorage: true
